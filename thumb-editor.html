<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iris Thumb Layout Editor</title>
<style>
* { box-sizing: border-box; }
body {
  background: #0d1117;
  color: #c9d1d9;
  font-family: 'Courier New', monospace;
  margin: 0;
  padding: 28px;
  user-select: none;
}
h1 { color: #00d9ff; font-size: 1.1rem; margin: 0 0 6px; letter-spacing: 3px; text-transform: uppercase; }
.hint { color: #6e7681; font-size: 0.78rem; margin: 0 0 28px; line-height: 1.7; }

/* ── Grid canvases ───────────────────────── */
.keyboards { display: flex; gap: 72px; align-items: flex-start; margin-bottom: 32px; }
.half { display: flex; flex-direction: column; gap: 8px; }
.half-label { color: #6e7681; font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; }
.grid-area { position: relative; overflow: visible; }

.key {
  position: absolute;
  width: 56px;
  height: 56px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  pointer-events: none;
}
.ref-key {
  background: linear-gradient(135deg, #1a1f3a, #0f1428);
  border: 1px solid #21262d;
  color: #3d4a5e;
}
.thumb-key {
  background: linear-gradient(135deg, #1a2540, #0f1a35);
  border: 2px solid #00d9ff;
  color: #e6edf3;
  cursor: grab;
  pointer-events: all;
  z-index: 10;
  box-shadow: 0 0 10px rgba(0,217,255,0.2);
  transition: box-shadow 0.1s;
}
.thumb-key:hover  { box-shadow: 0 0 20px rgba(0,217,255,0.5); }
.thumb-key.active { cursor: grabbing; opacity: 0.88; z-index: 100; box-shadow: 0 0 28px rgba(0,217,255,0.8); }
.ghost {
  position: absolute;
  width: 56px;
  height: 56px;
  border: 1px dashed #1e2733;
  pointer-events: none;
}

/* ── Slider controls ─────────────────────── */
.controls-wrap {
  display: flex;
  gap: 48px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.ctrl-half h3 {
  color: #00d9ff;
  font-size: 0.8rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 0 0 10px;
}
table { border-collapse: collapse; }
th {
  color: #6e7681;
  font-size: 0.68rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  padding: 0 12px 6px 0;
  text-align: left;
  font-weight: normal;
}
td { padding: 4px 12px 4px 0; vertical-align: middle; }
.key-name { color: #c9d1d9; font-size: 0.75rem; white-space: nowrap; }

.slider-cell { display: flex; align-items: center; gap: 6px; }
.slider-cell input[type=range] { width: 110px; accent-color: #00d9ff; cursor: pointer; }
.slider-cell .val { color: #00d9ff; font-size: 0.7rem; width: 36px; text-align: right; }

.no-slider { color: #3d4a5e; font-size: 0.7rem; }

/* ── Output ─────────────────────────────── */
.output-box {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 18px 20px;
}
.output-box h2 {
  color: #00d9ff;
  font-size: 0.85rem;
  margin: 0 0 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
}
pre { margin: 0; font-size: 0.8rem; line-height: 1.75; color: #e6edf3; white-space: pre-wrap; }
</style>
</head>
<body>

<h1>Iris Thumb Layout Editor</h1>
<p class="hint">
  <b style="color:#c9d1d9">Drag</b> cyan keys to snap to the nearest grid cell.<br>
  <b style="color:#c9d1d9">X / Y sliders</b> fine-tune position within ±48 px of the snapped cell.<br>
  <b style="color:#c9d1d9">Rot slider</b> adjusts rotation angle. Copy the output back to Claude when done.
</p>

<div class="keyboards">
  <div class="half">
    <div class="half-label">Left Half</div>
    <div class="grid-area" id="grid-left"></div>
  </div>
  <div class="half">
    <div class="half-label">Right Half</div>
    <div class="grid-area" id="grid-right"></div>
  </div>
</div>

<div class="controls-wrap">
  <div class="ctrl-half" id="ctrl-left"></div>
  <div class="ctrl-half" id="ctrl-right"></div>
</div>

<div class="output-box">
  <h2>Output — paste this back to Claude</h2>
  <pre id="output"></pre>
</div>

<script>
const CELL = 64;
const COLS = 7;
const ROWS = 6;
const OFF_MAX = 48;

const LEFT_REF = [
  { label:'LSFT', col:1, row:3 }, { label:'A',    col:2, row:3 }, { label:'S',    col:3, row:3 },
  { label:'D',    col:4, row:3 }, { label:'F',    col:5, row:3 }, { label:'G',    col:6, row:3 },
  { label:'LCTL', col:1, row:4 }, { label:'Z',    col:2, row:4 }, { label:'X',    col:3, row:4 },
  { label:'C',    col:4, row:4 }, { label:'V',    col:5, row:4 }, { label:'B',    col:6, row:4 },
];
const RIGHT_REF = [
  { label:'H',    col:2, row:3 }, { label:'J',    col:3, row:3 }, { label:'K',    col:4, row:3 },
  { label:'L',    col:5, row:3 }, { label:'P',    col:6, row:3 }, { label:'CAPS', col:7, row:3 },
  { label:'N',    col:2, row:4 }, { label:'M',    col:3, row:4 }, { label:'.',    col:4, row:4 },
  { label:"'",    col:5, row:4 }, { label:'/',    col:6, row:4 }, { label:'RAlt', col:7, row:4 },
];

const state = {
  left: [
    { id:'HOME',  label:'HOME',    col:7, row:5, xOff:0, yOff:0, rotation: 20, rotatable:true  },
    { id:'SFNT',  label:'SFT·ENT', col:7, row:6, xOff:0, yOff:0, rotation: 20, rotatable:true  },
    { id:'MO1',   label:'MO(1)',   col:6, row:6, xOff:0, yOff:0, rotation:  0, rotatable:false },
    { id:'LGUI',  label:'LGUI',    col:6, row:5, xOff:0, yOff:0, rotation:  0, rotatable:false },
  ],
  right: [
    { id:'END',   label:'END',     col:1, row:5, xOff:0, yOff:0, rotation:-20, rotatable:true  },
    { id:'SPCFN', label:'LT3·SP',  col:1, row:6, xOff:0, yOff:0, rotation:-20, rotatable:true  },
    { id:'MO2',   label:'MO(2)',   col:2, row:5, xOff:0, yOff:0, rotation:  0, rotatable:false },
    { id:'COMMA', label:',',       col:2, row:6, xOff:0, yOff:0, rotation:  0, rotatable:false },
  ],
};

function keyLeft(k) { return (k.col - 1) * CELL + k.xOff; }
function keyTop(k)  { return (k.row - 1) * CELL + k.yOff; }

function applyPos(el, k) {
  el.style.left      = keyLeft(k) + 'px';
  el.style.top       = keyTop(k)  + 'px';
  el.style.transform = `rotate(${k.rotation}deg)`;
}

// ── Build grid ───────────────────────────────────────────────────────
function buildGrid(containerId, refKeys, thumbKeys) {
  const container = document.getElementById(containerId);
  container.style.width  = (COLS * CELL - 8) + 'px';
  container.style.height = (ROWS * CELL - 8) + 'px';

  for (let r = 4; r <= 6; r++)
    for (let c = 1; c <= COLS; c++) {
      const g = document.createElement('div');
      g.className = 'ghost';
      g.style.left = ((c - 1) * CELL) + 'px';
      g.style.top  = ((r - 1) * CELL) + 'px';
      container.appendChild(g);
    }

  refKeys.forEach(k => {
    const el = document.createElement('div');
    el.className  = 'key ref-key';
    el.style.left = ((k.col - 1) * CELL) + 'px';
    el.style.top  = ((k.row - 1) * CELL) + 'px';
    el.textContent = k.label;
    container.appendChild(el);
  });

  thumbKeys.forEach(k => {
    const el = document.createElement('div');
    el.className = 'key thumb-key';
    el.id = 'key-' + k.id;
    applyPos(el, k);
    el.textContent = k.label;
    container.appendChild(el);
    makeDraggable(el, k);
  });
}

// ── Drag — snaps col/row, preserves xOff/yOff ───────────────────────
function makeDraggable(el, data) {
  el.addEventListener('mousedown', e => {
    e.preventDefault();
    el.classList.add('active');
    const sx = e.clientX, sy = e.clientY;
    const ox = keyLeft(data), oy = keyTop(data);

    const move = e => {
      el.style.left = (ox + e.clientX - sx) + 'px';
      el.style.top  = (oy + e.clientY - sy) + 'px';
    };
    const up = () => {
      el.classList.remove('active');
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);

      const rawX = parseInt(el.style.left);
      const rawY = parseInt(el.style.top);
      data.col  = Math.max(1, Math.min(COLS, Math.round(rawX / CELL) + 1));
      data.row  = Math.max(1, Math.min(ROWS, Math.round(rawY / CELL) + 1));
      // keep fractional part as offset, clamped
      data.xOff = Math.max(-OFF_MAX, Math.min(OFF_MAX, rawX - (data.col - 1) * CELL));
      data.yOff = Math.max(-OFF_MAX, Math.min(OFF_MAX, rawY - (data.row - 1) * CELL));

      applyPos(el, data);
      syncSliders(data);
      updateOutput();
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });
}

// ── Controls table ───────────────────────────────────────────────────
function makeSliderCell(value, min, max, onChange) {
  const cell = document.createElement('td');
  const wrap = document.createElement('div');
  wrap.className = 'slider-cell';

  const slider = document.createElement('input');
  slider.type  = 'range';
  slider.min   = min;
  slider.max   = max;
  slider.value = value;
  slider.step  = 1;

  const val = document.createElement('span');
  val.className   = 'val';
  val.textContent = value;

  slider.addEventListener('input', () => {
    val.textContent = slider.value;
    onChange(+slider.value, slider, val);
  });

  wrap.append(slider, val);
  cell.appendChild(wrap);
  // stash refs so syncSliders can update them
  cell._slider = slider;
  cell._val    = val;
  return cell;
}

function buildControls(containerId, thumbKeys) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';

  const side = containerId.includes('left') ? 'Left' : 'Right';
  const h3 = document.createElement('h3');
  h3.textContent = side;
  wrap.appendChild(h3);

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>Key</th><th>X offset</th><th>Y offset</th><th>Rotation</th></tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  thumbKeys.forEach(k => {
    const tr = document.createElement('tr');
    tr.id = 'ctrl-row-' + k.id;

    // Name
    const nameTd = document.createElement('td');
    nameTd.className = 'key-name';
    nameTd.textContent = k.label;
    tr.appendChild(nameTd);

    // X offset
    const xTd = makeSliderCell(k.xOff, -OFF_MAX, OFF_MAX, (v) => {
      k.xOff = v;
      const el = document.getElementById('key-' + k.id);
      if (el) el.style.left = keyLeft(k) + 'px';
      updateOutput();
    });
    xTd.id = 'xslider-' + k.id;
    tr.appendChild(xTd);

    // Y offset
    const yTd = makeSliderCell(k.yOff, -OFF_MAX, OFF_MAX, (v) => {
      k.yOff = v;
      const el = document.getElementById('key-' + k.id);
      if (el) el.style.top = keyTop(k) + 'px';
      updateOutput();
    });
    yTd.id = 'yslider-' + k.id;
    tr.appendChild(yTd);

    // Rotation
    if (k.rotatable) {
      const rTd = makeSliderCell(k.rotation, -45, 45, (v) => {
        k.rotation = v;
        const el = document.getElementById('key-' + k.id);
        if (el) el.style.transform = `rotate(${v}deg)`;
        updateOutput();
      });
      rTd.id = 'rslider-' + k.id;
      tr.appendChild(rTd);
    } else {
      const rTd = document.createElement('td');
      rTd.innerHTML = '<span class="no-slider">—</span>';
      tr.appendChild(rTd);
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
}

// Called after drag to sync X/Y slider positions to new xOff/yOff values
function syncSliders(data) {
  const xTd = document.getElementById('xslider-' + data.id);
  const yTd = document.getElementById('yslider-' + data.id);
  if (xTd) { xTd._slider.value = data.xOff; xTd._val.textContent = data.xOff; }
  if (yTd) { yTd._slider.value = data.yOff; yTd._val.textContent = data.yOff; }
}

// ── Output ───────────────────────────────────────────────────────────
function updateOutput() {
  const fmt = k =>
    `  { col:${String(k.col).padStart(2)}, row:${String(k.row).padStart(2)}, xOff:${String(k.xOff).padStart(4)}, yOff:${String(k.yOff).padStart(4)}, rotation:${String(k.rotation).padStart(4)} }, // ${k.label}`;

  const out =
`LEFT_THUMB_CELLS = [\n${state.left.map(fmt).join('\n')}\n];\n\n` +
`RIGHT_THUMB_CELLS = [\n${state.right.map(fmt).join('\n')}\n];`;

  document.getElementById('output').textContent = out;
}

// ── Init ─────────────────────────────────────────────────────────────
buildGrid('grid-left',  LEFT_REF,  state.left);
buildGrid('grid-right', RIGHT_REF, state.right);
buildControls('ctrl-left',  state.left);
buildControls('ctrl-right', state.right);
updateOutput();
</script>
</body>
</html>
